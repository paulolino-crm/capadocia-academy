<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capadócia Academy — Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    h1, h2 { font-family: 'Epilogue', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">

      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800">Entrar no sistema</h1>
      </div>

      <div id="mensagem-erro" class="hidden bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm"></div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com.br"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input type="password" id="senha" placeholder="••••••••"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <button type="submit" id="btn-entrar"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
          Entrar
        </button>
      </form>

      <p class="text-center text-xs text-slate-400 mt-6">
        Esqueceu a senha? Fale com o administrador.
      </p>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">
      © 2026 Capadócia Academy — Todos os direitos reservados
    </p>
  </div>

 <script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://volxtgqwdrcqrrxcfpcv.supabase.co',
    'sb_publishable_Ew_M-Hmi7qxXJUCnN2ZEuw_i_CJ1feQ'
  )

    // ✅ Verificar se já está logado
    const { data: { session } } = await supabase.auth.getSession()
    if (session) await irParaDashboard(session.user.id)

    // ✅ Função de redirecionamento por tipo
    async function irParaDashboard(userId) {
      const { data: perfil } = await supabase
        .from('perfis')
        .select('tipo')
        .eq('id', userId)
        .single()

      const destinos = {
        admin:     './dashboard/dashboard.html',
        professor: './dashboard/alunos.html',
        aluno:     './dashboard/aluno-portal.html'
      }

      window.location.href = destinos[perfil?.tipo] || 'login.html'
    }

    // ✅ Evento de login
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const erro  = document.getElementById('mensagem-erro')
      const btn   = document.getElementById('btn-entrar')

      btn.textContent = 'Entrando...'
      btn.disabled    = true
      erro.classList.add('hidden')

      const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha })

      if (error) {
        erro.textContent = 'E-mail ou senha incorretos!'
        erro.classList.remove('hidden')
        btn.textContent = 'Entrar'
        btn.disabled    = false
        return
      }

      await irParaDashboard(data.user.id)
    })
  </script>

</body>
</html>
