<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capadócia Academy — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    h1, h2 { font-family: 'Epilogue', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800">Entrar no sistema</h1>
      </div>

      <div id="mensagem-erro" class="hidden bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm"></div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com.br"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
          <input type="password" id="senha" placeholder="••••••••"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>
        <button type="submit" id="btn-entrar"
          class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
          Entrar
        </button>
      </form>

      <p class="text-center text-xs text-slate-400 mt-6">
        Esqueceu a senha? Fale com o administrador.
      </p>
    </div>
    <p class="text-center text-xs text-slate-400 mt-4">
      © 2026 Capadócia Academy — Todos os direitos reservados
    </p>
  </div>

  <script>
    // ── Configuração Supabase ──────────────────────────────
    const SUPABASE_URL = 'https://volxtgqwdrcqrrxcfpcv.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_Ew_M-Hmi7qxXJUCnN2ZEuw_i_CJ1feQ'

    // ── Função auxiliar para chamadas à API ───────────────
    async function supabaseFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}${path}`, {
        ...options,
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      })
      return res.json()
    }

    // ── Login ─────────────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const erro  = document.getElementById('mensagem-erro')
      const btn   = document.getElementById('btn-entrar')

      btn.textContent = 'Entrando...'
      btn.disabled    = true
      erro.classList.add('hidden')

      try {
        // Faz login
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password: senha })
        })

        const data = await res.json()

        if (!res.ok || data.error) {
          throw new Error(data.error_description || 'Erro ao fazer login')
        }

        // Salva token na sessão
        localStorage.setItem('sb_token', data.access_token)
        localStorage.setItem('sb_user_id', data.user.id)

        // Busca tipo do perfil
        const perfil = await supabaseFetch(
          `/rest/v1/perfis?select=tipo&id=eq.${data.user.id}`,
          {
            headers: {
              'Authorization': `Bearer ${data.access_token}`
            }
          }
        )

        const tipo = perfil[0]?.tipo

        const destinos = {
          admin:     './dashboard/dashboard.html',
          professor: './dashboard/alunos.html',
          aluno:     './dashboard/aluno-portal.html'
        }

        window.location.href = destinos[tipo] || 'login.html'

      } catch (err) {
        erro.textContent = 'E-mail ou senha incorretos!'
        erro.classList.remove('hidden')
        btn.textContent = 'Entrar'
        btn.disabled    = false
      }
    })
  </script>

</body>
</html>
